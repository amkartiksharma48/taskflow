version: "3.8"

services:
  backend:
    image: kartiksharma48/taskflow-backend:latest
    container_name: taskflow-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
    restart: unless-stopped

  frontend:
    image: kartiksharma48/taskflow-frontend:latest
    container_name: taskflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped